<!DOCTYPE html>
<html lang="en">

    <head>
        <link rel="stylesheet" href="/stylesheets/style.css">
        <link rel="stylesheet" href="/stylesheets/fonts.css">
        <style>
            body {
                margin: 5vw;
            }

            .menu-card {
                display: flex;
                flex-direction: row;
                border: 1px solid var(--lighter-brown);
                border-radius: 2.5vw;
                padding-block: 3vw;
                padding-inline: 4vw;
            }

            .menu-card-image {
                height: 30vw;
                width: 30vw;
                border-radius: 1.2vw;
            }

            .menu-item-details-box {
                width: 100%;
                display: flex;
                flex-direction: column;
                margin: 3vw;
                color: var(--almost-white);
            }
        </style>
    </head>

    <body class="dark-pattern-bg">
        <div class="menu-card">
            <img src="assets/sfpizza.jpg" class="menu-card-image">
            <div class="menu-item-details-box">
                <h1>Margherita</h1>
                <p style="font-size: 3vw; color: var(--almost-white);">Tomato sauce, fresh mozzarella, basil, sea salt,
                    California
                    extra virgin olive oil</>
            </div>
            <!-- <img src="/assets/Hero Image.png" class="menu-card-image"> -->
        </div>
    </body>

</html>
