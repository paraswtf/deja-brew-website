<!DOCTYPE html>
<html lang="en">

    <head>
        <link rel="stylesheet" href="/stylesheets/style.css">
        <link rel="stylesheet" href="/stylesheets/fonts.css">
        <style>
            body {
                margin: 5vw;
            }

            .dark-bg {
                background-color: var(--dark-brown);
            }

            .menu-card {
                display: flex;
                flex-direction: row;
                border: 1px solid var(--lighter-brown);
                border-radius: 1.5vw;
                padding-block: 1.5vw;
                padding-inline: 2vw;
            }

            .menu-card-image {
                height: 15vw;
                width: 15vw;
                border-radius: 1.2vw;
                object-fit: cover;
            }

            .menu-item-details-box {
                width: 100%;
                display: flex;
                flex-direction: column;
                margin-inline: 3vw;
                color: var(--almost-white);
            }

            .price {
                font-size: 2.5vw;
                color: var(--almost-white);
            }

            h2 {
                margin-bottom: 1.5vw;
            }
        </style>
    </head>

    <body class="dark-bg">
        <div class="menu-card dark-pattern-bg">
            <img src="assets/sfpizza.jpg" class="menu-card-image">
            <div class="menu-item-details-box">
                <h2>Margherita</h2>
                <p style="font-size: 2vw; color: var(--almost-white);">Tomato sauce, fresh mozzarella, basil, sea salt,
                    California
                    extra virgin olive oil
                </p>
            </div>
            <div>
                <p class="price">₹500/₹350</p>
            </div>
            <!-- <img src="/assets/Hero Image.png" class="menu-card-image"> -->
        </div>
    </body>

</html>
