<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Deja Brew - Menu</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="/stylesheets/fonts.css">
        <link rel="stylesheet" href="/stylesheets/style.css">
        <link rel="stylesheet" href="/stylesheets/footer.css">
        <!-- Stylesheets end -->
        <style>
            .menu-head {
                color: var(--dark-brown);
            }

            .menu-head-container {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: row;
                gap: 3vw;
            }

            .button {
                display: flex;
                align-items: center;
                flex-direction: column;
                gap: 1vw;
                padding: 1vw;
                border-radius: 1vw 0vw 0vw 1vw;
                background-color: var(--white);
                color: var(--dark-brown);
                width: 14vw;
                height: 10vw;
                border: 1px solid var(--dark-brown);
                border-right: none;
                cursor: pointer;
                transition: all 0.1s ease-in-out;
                overflow: hidden;
            }

            .button:hover,
            .button:active {
                background-color: var(--dark-brown);
                color: var(--white);
            }

            .button:hover .button-icon {
                height: 10vw;
                width: 10vw;
            }

            .button-clicked .button-icon {
                height: 8vw;
                width: 8vw;
            }

            .button-clicked {
                align-items: center;
                justify-content: center;
                background-color: var(--dark-brown);
            }

            .button:hover .button-text,
            .button-clicked .button-text {
                display: none;
            }

            .button-icon {
                width: 5vw;
                height: 5vw;
                transition: all 0.1s ease-in-out;
            }

            .menu-logo {
                width: 10vw;
                height: 10vw;
            }

            .buttons-group {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                gap: 1vw;
            }

            body {
                display: flex;
                flex-direction: column;
                gap: 2vw;
                margin: 0;
                padding: 0;
                scroll-behavior: smooth;
            }

            .menu-section {
                display: flex;
                flex-direction: row;
                margin-inline: 10vw;
                border-radius: 1vw;
                overflow: hidden;
            }

            .iframe-container {
                margin-block: -1px;
                display: flex;
                width: 100%;
                background-color: var(--dark-brown);
            }

            iframe {
                background-color: var(--dark-brown);
            }
        </style>
        <!-- Navbar created using js so that we don't have to write code again and again-->
        <script src="/navbar.js" defer></script>

        <script defer>
            function buttonClick(button, src) {
                document.querySelector(".iframe-container iframe").src = src;

                document.querySelectorAll(".button").forEach((button) => {
                    button.classList.remove("button-clicked");
                });
                button.classList.add("button-clicked");
            }
        </script>
    </head>

    <body class="light-pattern-bg">
        <div class="navspacer"></div>
        <div class="menu-head-container">
            <img src="/assets/food-icon.svg" alt="food-icon" class="menu-logo">
            <h1 class="menu-head">Our Menu</h1>
        </div>
        <div class="menu-section">
            <div class="buttons-group">
                <div class="button" onclick="buttonClick(this,'/menupage.html?page=coffee')" id="button">
                    <img src="/assets/coffee-icon.svg" alt="coffee icon" class="button-icon">
                    <h3 class="button-text">Coffee</h3>
                </div>
                <div class="button" onclick="buttonClick(this,'/menupage.html?page=pizzas')" id="button">
                    <img src="/assets/pizzas-icon.svg" alt="pizzas icon" class="button-icon">
                    <h3 class="button-text">Pizzas</h3>
                </div>
                <div class="button" onclick="buttonClick(this,'/menupage.html?page=burgers')" id="button">
                    <img src="/assets/burgers-icon.svg" alt="burgers icon" class="button-icon">
                    <h3 class="button-text">Burgers</h3>
                </div>
                <div class="button" onclick="buttonClick(this,'/menupage.html?page=snacks')" id="button">
                    <img src="/assets/snacks-icon.svg" alt="snacks icon" class="button-icon">
                    <h3 class="button-text">Snacks</h3>
                </div>
                <div class="button" onclick="buttonClick(this,'/menupage.html?page=desserts')" id="button">
                    <img src="/assets/dessert-icon.svg" alt="desserts icon" class="button-icon">
                    <h3 class="button-text">Desserts</h3>
                </div>
                <butt class="button" onclick="buttonClick(this,'/menupage.html?page=drinks')" id="button">
                    <img src="/assets/drinks-icon.svg" alt="drinks icon" class="button-icon">
                    <h3 class="button-text">Drinks</h3>
                </butt>
            </div>
            <div class="iframe-container">
                <iframe src="/menupage.html?page=coffee" style="height: 100%; width: 100%;"></iframe>
            </div>
        </div>
    </body>

</html>
